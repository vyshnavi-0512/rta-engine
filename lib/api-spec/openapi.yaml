openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Real-Time Analytics Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Event ingestion
  - name: stats
    description: Analytics statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    post:
      operationId: ingestEvent
      tags: [events]
      summary: Ingest an analytics event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          description: Invalid input

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get overall analytics stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /active-users:
    get:
      operationId: getActiveUsers
      tags: [stats]
      summary: Get current active user count
      responses:
        "200":
          description: Active users count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveUsers"

  /popular-pages:
    get:
      operationId: getPopularPages
      tags: [stats]
      summary: Get top visited pages
      responses:
        "200":
          description: Popular pages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PageStat"

  /error-rate:
    get:
      operationId: getErrorRate
      tags: [stats]
      summary: Get current error rate
      responses:
        "200":
          description: Error rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorRate"

  /page-views-over-time:
    get:
      operationId: getPageViewsOverTime
      tags: [stats]
      summary: Get page views grouped by hour
      responses:
        "200":
          description: Page views timeseries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeseriesPoint"

  /api-performance:
    get:
      operationId: getApiPerformance
      tags: [stats]
      summary: Get API endpoint response times
      responses:
        "200":
          description: API performance stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiEndpointStat"

  /recent-events:
    get:
      operationId: getRecentEvents
      tags: [stats]
      summary: Get recent events feed
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /feature-usage:
    get:
      operationId: getFeatureUsage
      tags: [stats]
      summary: Get feature usage breakdown
      responses:
        "200":
          description: Feature usage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureUsage"

  /drop-off-funnel:
    get:
      operationId: getDropOffFunnel
      tags: [stats]
      summary: Get user drop-off funnel data
      responses:
        "200":
          description: Drop-off funnel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FunnelStep"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    EventInput:
      type: object
      required:
        - event
        - userId
      properties:
        event:
          type: string
          description: Event type (e.g. button_click, page_view, error)
        userId:
          type: string
        page:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true

    Event:
      type: object
      required:
        - id
        - event
        - userId
        - timestamp
      properties:
        id:
          type: integer
        event:
          type: string
        userId:
          type: string
        page:
          type: ["string", "null"]
        timestamp:
          type: string
          format: date-time

    Stats:
      type: object
      required:
        - totalEvents
        - totalUsers
        - totalPageViews
        - totalErrors
        - totalClicks
        - activeUsers
        - errorRate
        - avgResponseMs
      properties:
        totalEvents:
          type: integer
        totalUsers:
          type: integer
        totalPageViews:
          type: integer
        totalErrors:
          type: integer
        totalClicks:
          type: integer
        activeUsers:
          type: integer
        errorRate:
          type: number
        avgResponseMs:
          type: number

    ActiveUsers:
      type: object
      required:
        - count
        - trend
      properties:
        count:
          type: integer
        trend:
          type: number
          description: Percentage change from last 5 minutes

    PageStat:
      type: object
      required:
        - page
        - views
        - uniqueUsers
      properties:
        page:
          type: string
        views:
          type: integer
        uniqueUsers:
          type: integer

    ErrorRate:
      type: object
      required:
        - rate
        - total
        - errors
        - trend
      properties:
        rate:
          type: number
          description: Error rate as a percentage
        total:
          type: integer
        errors:
          type: integer
        trend:
          type: number

    TimeseriesPoint:
      type: object
      required:
        - hour
        - views
        - clicks
        - errors
      properties:
        hour:
          type: string
        views:
          type: integer
        clicks:
          type: integer
        errors:
          type: integer

    ApiEndpointStat:
      type: object
      required:
        - endpoint
        - avgMs
        - p95Ms
        - calls
        - errorRate
      properties:
        endpoint:
          type: string
        avgMs:
          type: number
        p95Ms:
          type: number
        calls:
          type: integer
        errorRate:
          type: number

    FeatureUsage:
      type: object
      required:
        - feature
        - usageCount
        - uniqueUsers
      properties:
        feature:
          type: string
        usageCount:
          type: integer
        uniqueUsers:
          type: integer

    FunnelStep:
      type: object
      required:
        - step
        - users
        - dropOff
      properties:
        step:
          type: string
        users:
          type: integer
        dropOff:
          type: number
          description: Drop-off percentage from previous step
